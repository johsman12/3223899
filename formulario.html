<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    
</head>
<body>
    <h3>Formulario de Registro Deportivo</h3>

    <form>

        <h4>Datos Personales</h4>

        <label>Nombre completo:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Tipo de identificación:</label><br>
        <select name="tipo_id">
            <option>Cédula</option>
            <option>Pasaporte</option>
            <option>Tarjeta de identidad</option>
        </select><br><br>

        <label>Número de identificación:</label><br>
        <input type="number" name="identificacion"><br><br>

        <label>Correo electronico:</label><br>
        <input type="email" name="correo"><br><br>

        <label>Número de telefono:</label><br>
        <input type="tel" name="telefono"><br><br>

        <label>Direccion:</label><br>
        <input type="text" name="direccion"><br><br>

        <label>Fecha de nacimiento:</label><br>
        <input type="date" name="fecha"><br><br>

        <label>Edad:</label><br>
        <input type="number" name="edad"><br><br>

        <hr>

        <h4>Genero</h4>

        <input type="radio" name="genero"> Masculino<br>
        <input type="radio" name="genero"> Femenino<br>
        <input type="radio" name="genero"> Otro<br><br>

        <h4>Deportes de interés</h4>

        <input type="checkbox"> Futbol<br>
        <input type="checkbox"> Baloncesto<br>
        <input type="checkbox"> Tenis<br>
        <input type="checkbox"> Atletismo<br><br>

        <label>Nivel deportivo:</label><br>
        <select name="nivel">
            <option>Recreativo</option>
            <option>Semiprofesional</option>
            <option>Profesional</option>
        </select><br><br>

        <h4>Comentarios</h4>

        <textarea rows="5" placeholder="Escribe aquí tus comentarios..."></textarea><br><br>

        <input type="submit" value="Registrarse">
        </form>
    </div>

</div>

</body>
</html>
