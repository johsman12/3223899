<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor-formulario">

    <div class="formulario">
        <h3>Formulario de Registro Deportivo</h3>

    <nav>
    <a href="index.html">Inicio</a>
    <a href="futbol.html">Futbol</a>
    <a href="baloncesto.html">Baloncesto</a>
    <a href="tenis.html">Tenis</a>
    <a href="iniciar sesion.html">Iniciar Sesion</a>
    <a href="formulario.html">Formulario</a>
    </nav>

        <form>

        <h4>Datos Personales</h4>

        <label>Nombre completo:</label>
        <input type="text" name="nombre" required>

        <label>Tipo de identificación:</label>
        <select name="tipo_id">
            <option>Cédula</option>
            <option>Pasaporte</option>
            <option>Tarjeta de identidad</option>
        </select>

        <label>Número de identificación:</label>
        <input type="number" name="identificacion">

        <label>Correo electronico:</label>
        <input type="email" name="correo">

        <label>Número de telefono:</label>
        <input type="tel" name="telefono">

        <label>Direccion:</label>
        <input type="text" name="direccion">

        <label>Fecha de nacimiento:</label>
        <input type="date" name="fecha">

        <label>Edad:</label>
        <input type="number" name="edad">

        <hr>

        <h4>Genero</h4>

        <div class="opciones">
            <label><input type="radio" name="genero"> Masculino</label>
            <label><input type="radio" name="genero"> Femenino</label>
            <label><input type="radio" name="genero"> Otro</label>
        </div>

        <h4>Deportes de interés</h4>

        <div class="opciones">
            <label><input type="checkbox"> Futbol</label>
            <label><input type="checkbox"> Baloncesto</label>
            <label><input type="checkbox"> Tenis</label>
            <label><input type="checkbox"> Atletismo</label>
        </div>

        <label>Nivel deportivo:</label>
        <select name="nivel">
            <option>Recreativo</option>
            <option>Semiprofesional</option>
            <option>Profesional</option>
        </select>

        <h4>Comentarios</h4>

        <textarea rows="5" placeholder="Escribe aquí tus comentarios..."></textarea>

        <input type="submit" value="Registrarse">

        </form>
    </div>

</div>

</body>
</html>
